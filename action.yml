name: Lighthouse Governance
description: Build a project, audit discovered or configured routes with Lighthouse CI, and fail on threshold regressions.

inputs:
  working-directory:
    description: Directory of the project being audited.
    required: false
    default: "."
  package-manager:
    description: npm, pnpm, yarn, or none.
    required: false
    default: "npm"
  pnpm-version:
    description: Optional pnpm version to install when package-manager is pnpm. Leave blank to use packageManager from package.json.
    required: false
    default: ""
  node-version:
    description: Node.js version used for install/build/LHCI.
    required: false
    default: "20"
  install-command:
    description: Dependency install command. Leave blank to infer from package-manager. Use "skip" to skip.
    required: false
    default: ""
  build-command:
    description: Build command. Leave blank to infer from package-manager. Use "skip" to skip.
    required: false
    default: ""
  start-server-command:
    description: Command LHCI uses to start the already-built app.
    required: false
    default: ""
  start-server-ready-pattern:
    description: Regex/string LHCI waits for before auditing.
    required: false
    default: "Ready|ready|started server|listening"
  start-server-ready-timeout:
    description: Milliseconds LHCI waits for the server to be ready.
    required: false
    default: "180000"
  base-url:
    description: Base URL for relative routes.
    required: false
    default: "http://127.0.0.1:3100"
  port:
    description: Port used by the inferred start command.
    required: false
    default: "3100"
  profile:
    description: Lighthouse profile, desktop or mobile.
    required: false
    default: "desktop"
  routes:
    description: Comma-separated route list. When set, these routes are audited instead of discovery.
    required: false
    default: ""
  routes-file:
    description: JSON file containing an array of routes or an object with a routes array.
    required: false
    default: ""
  route-config-file:
    description: Optional lighthouse-governance config file.
    required: false
    default: ""
  app-dir:
    description: Comma-separated Next app directories to scan.
    required: false
    default: "app,src/app"
  pages-dir:
    description: Comma-separated Next pages directories to scan.
    required: false
    default: "pages,src/pages"
  include-sitemap:
    description: Whether to read /sitemap.xml from base-url and include those routes.
    required: false
    default: "false"
  fail-on-unresolved-dynamic-routes:
    description: Fail route generation if dynamic pages do not have configured samples.
    required: false
    default: "false"
  changed-routes-only:
    description: Audit only routes whose Next.js route files changed in the triggering diff.
    required: false
    default: "false"
  changed-files:
    description: Optional comma- or newline-separated changed file list. Leave blank to infer from Git.
    required: false
    default: ""
  number-of-runs:
    description: LHCI numberOfRuns per route.
    required: false
    default: "1"
  lhci-version:
    description: "@lhci/cli version used by npx."
    required: false
    default: "0.13.0"
  upload-target:
    description: LHCI upload target.
    required: false
    default: "temporary-public-storage"
  performance-min-score:
    description: Minimum Lighthouse performance category score. Empty disables this assertion.
    required: false
    default: "0.85"
  accessibility-min-score:
    description: Minimum Lighthouse accessibility category score. Empty disables this assertion.
    required: false
    default: "0.95"
  best-practices-min-score:
    description: Minimum Lighthouse Best Practices category score. Empty disables this all-or-nothing category assertion.
    required: false
    default: ""
  seo-min-score:
    description: Minimum Lighthouse SEO category score. Empty disables this assertion.
    required: false
    default: "0.95"
  lcp-max-ms:
    description: Largest Contentful Paint maximum in milliseconds. Empty disables this assertion.
    required: false
    default: "2500"
  tbt-max-ms:
    description: Total Blocking Time maximum in milliseconds. Empty disables this assertion.
    required: false
    default: "200"
  cls-max:
    description: Cumulative Layout Shift maximum. Empty disables this assertion.
    required: false
    default: "0.1"
  errors-in-console-min-score:
    description: Minimum errors-in-console audit score. Empty disables this assertion.
    required: false
    default: "1"
  enforce-best-practices-allowlist:
    description: Run the actionable Best Practices checker after LHCI.
    required: false
    default: "false"
  best-practices-allowlist:
    description: Comma-separated Best Practices audit IDs that are allowed to fail when allowlist enforcement is enabled.
    required: false
    default: "third-party-cookies,deprecations,inspector-issues"
  upload-artifact:
    description: Upload .lighthouseci as a workflow artifact.
    required: false
    default: "true"

outputs:
  route-count:
    description: Number of routes selected for this run.
    value: ${{ steps.routes.outputs.route-count }}

runs:
  using: composite
  steps:
    - name: Setup pnpm from input
      if: ${{ inputs.package-manager == 'pnpm' && inputs.pnpm-version != '' }}
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup pnpm from package.json
      if: ${{ inputs.package-manager == 'pnpm' && inputs.pnpm-version == '' }}
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Resolve Lighthouse governance commands
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        INSTALL_COMMAND_INPUT: ${{ inputs.install-command }}
        BUILD_COMMAND_INPUT: ${{ inputs.build-command }}
        START_SERVER_COMMAND_INPUT: ${{ inputs.start-server-command }}
        PORT: ${{ inputs.port }}
      run: |
        set -euo pipefail

        resolve_install_command() {
          if [ "$INSTALL_COMMAND_INPUT" = "skip" ]; then
            return
          fi
          if [ -n "$INSTALL_COMMAND_INPUT" ]; then
            printf '%s\n' "$INSTALL_COMMAND_INPUT"
            return
          fi
          case "$PACKAGE_MANAGER" in
            pnpm) printf '%s\n' "pnpm install --frozen-lockfile" ;;
            yarn) printf '%s\n' "yarn install --frozen-lockfile" ;;
            npm) printf '%s\n' "npm ci" ;;
            none) ;;
            *) printf '%s\n' "$PACKAGE_MANAGER install" ;;
          esac
        }

        resolve_build_command() {
          if [ "$BUILD_COMMAND_INPUT" = "skip" ]; then
            return
          fi
          if [ -n "$BUILD_COMMAND_INPUT" ]; then
            printf '%s\n' "$BUILD_COMMAND_INPUT"
            return
          fi
          case "$PACKAGE_MANAGER" in
            pnpm) printf '%s\n' "pnpm build" ;;
            yarn) printf '%s\n' "yarn build" ;;
            npm) printf '%s\n' "npm run build" ;;
            none) ;;
            *) printf '%s\n' "$PACKAGE_MANAGER run build" ;;
          esac
        }

        resolve_start_command() {
          if [ -n "$START_SERVER_COMMAND_INPUT" ]; then
            printf '%s\n' "$START_SERVER_COMMAND_INPUT"
            return
          fi
          case "$PACKAGE_MANAGER" in
            pnpm) printf '%s\n' "pnpm start --hostname=127.0.0.1 --port=$PORT" ;;
            yarn) printf '%s\n' "yarn start --hostname=127.0.0.1 --port=$PORT" ;;
            npm) printf '%s\n' "npm run start -- --hostname=127.0.0.1 --port=$PORT" ;;
            none) ;;
            *) printf '%s\n' "$PACKAGE_MANAGER run start -- --hostname=127.0.0.1 --port=$PORT" ;;
          esac
        }

        {
          echo "LG_INSTALL_COMMAND=$(resolve_install_command)"
          echo "LG_BUILD_COMMAND=$(resolve_build_command)"
          echo "LHCI_START_SERVER_COMMAND=$(resolve_start_command)"
        } >> "$GITHUB_ENV"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -n "${LG_INSTALL_COMMAND:-}" ]; then
          bash -lc "$LG_INSTALL_COMMAND"
        fi

    - name: Build project
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -n "${LG_BUILD_COMMAND:-}" ]; then
          bash -lc "$LG_BUILD_COMMAND"
        fi

    - name: Generate Lighthouse route manifest
      id: routes
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BASE_URL: ${{ inputs.base-url }}
        PROFILE: ${{ inputs.profile }}
        ROUTES: ${{ inputs.routes }}
        ROUTES_FILE_INPUT: ${{ inputs.routes-file }}
        ROUTE_CONFIG_FILE: ${{ inputs.route-config-file }}
        APP_DIR: ${{ inputs.app-dir }}
        PAGES_DIR: ${{ inputs.pages-dir }}
        INCLUDE_SITEMAP: ${{ inputs.include-sitemap }}
        FAIL_ON_UNRESOLVED_DYNAMIC_ROUTES: ${{ inputs.fail-on-unresolved-dynamic-routes }}
        CHANGED_ROUTES_ONLY: ${{ inputs.changed-routes-only }}
        CHANGED_FILES: ${{ inputs.changed-files }}
      run: |
        set -euo pipefail
        mkdir -p .lighthouseci

        args=(
          routes
          --project-root "$PWD"
          --base-url "$BASE_URL"
          --profile "$PROFILE"
          --output ".lighthouseci/routes.json"
          --app-dir "$APP_DIR"
          --pages-dir "$PAGES_DIR"
        )

        if [ -n "$ROUTES" ]; then
          args+=(--routes "$ROUTES")
        fi
        if [ -n "$ROUTES_FILE_INPUT" ]; then
          args+=(--routes-file "$ROUTES_FILE_INPUT")
        fi
        if [ -n "$ROUTE_CONFIG_FILE" ]; then
          args+=(--config "$ROUTE_CONFIG_FILE")
        fi
        if [ "$INCLUDE_SITEMAP" = "true" ]; then
          args+=(--include-sitemap)
        fi
        if [ "$FAIL_ON_UNRESOLVED_DYNAMIC_ROUTES" = "true" ]; then
          args+=(--fail-on-unresolved-dynamic-routes)
        fi
        if [ "$CHANGED_ROUTES_ONLY" = "true" ]; then
          args+=(--changed-routes-only)
        fi
        if [ -n "$CHANGED_FILES" ]; then
          args+=(--changed-files "$CHANGED_FILES")
        fi

        node "$GITHUB_ACTION_PATH/bin/lighthouse-governance.mjs" "${args[@]}"

        route_count="$(node -e 'const fs = require("node:fs"); const manifest = JSON.parse(fs.readFileSync(".lighthouseci/routes.json", "utf8")); console.log(manifest.routeCount ?? (Array.isArray(manifest.routes) ? manifest.routes.length : 0));')"
        echo "route-count=$route_count" >> "$GITHUB_OUTPUT"
        if [ "$route_count" = "0" ]; then
          echo "[lighthouse-governance] no routes selected; LHCI steps will be skipped"
        fi

    - name: Generate LHCI config
      if: ${{ steps.routes.outputs.route-count != '0' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BASE_URL: ${{ inputs.base-url }}
        PROFILE: ${{ inputs.profile }}
        START_SERVER_READY_PATTERN: ${{ inputs.start-server-ready-pattern }}
        START_SERVER_READY_TIMEOUT: ${{ inputs.start-server-ready-timeout }}
        NUMBER_OF_RUNS: ${{ inputs.number-of-runs }}
        UPLOAD_TARGET: ${{ inputs.upload-target }}
        PERFORMANCE_MIN_SCORE: ${{ inputs.performance-min-score }}
        ACCESSIBILITY_MIN_SCORE: ${{ inputs.accessibility-min-score }}
        BEST_PRACTICES_MIN_SCORE: ${{ inputs.best-practices-min-score }}
        SEO_MIN_SCORE: ${{ inputs.seo-min-score }}
        LCP_MAX_MS: ${{ inputs.lcp-max-ms }}
        TBT_MAX_MS: ${{ inputs.tbt-max-ms }}
        CLS_MAX: ${{ inputs.cls-max }}
        ERRORS_IN_CONSOLE_MIN_SCORE: ${{ inputs.errors-in-console-min-score }}
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/bin/lighthouse-governance.mjs" config \
          --project-root "$PWD" \
          --base-url "$BASE_URL" \
          --profile "$PROFILE" \
          --routes-file ".lighthouseci/routes.json" \
          --output ".lighthouseci/lighthouserc.cjs" \
          --start-server-ready-pattern "$START_SERVER_READY_PATTERN" \
          --start-server-ready-timeout "$START_SERVER_READY_TIMEOUT" \
          --number-of-runs "$NUMBER_OF_RUNS" \
          --upload-target "$UPLOAD_TARGET" \
          --performance-min-score "$PERFORMANCE_MIN_SCORE" \
          --accessibility-min-score "$ACCESSIBILITY_MIN_SCORE" \
          --best-practices-min-score "$BEST_PRACTICES_MIN_SCORE" \
          --seo-min-score "$SEO_MIN_SCORE" \
          --lcp-max-ms "$LCP_MAX_MS" \
          --tbt-max-ms "$TBT_MAX_MS" \
          --cls-max "$CLS_MAX" \
          --errors-in-console-min-score "$ERRORS_IN_CONSOLE_MIN_SCORE"

    - name: Run Lighthouse CI
      if: ${{ steps.routes.outputs.route-count != '0' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        LHCI_BASE_URL: ${{ inputs.base-url }}
        LHCI_PROFILE: ${{ inputs.profile }}
        LHCI_ROUTES_FILE: .lighthouseci/routes.json
        LHCI_START_SERVER_READY_PATTERN: ${{ inputs.start-server-ready-pattern }}
        LHCI_START_SERVER_READY_TIMEOUT: ${{ inputs.start-server-ready-timeout }}
        LHCI_NUMBER_OF_RUNS: ${{ inputs.number-of-runs }}
        LHCI_UPLOAD_TARGET: ${{ inputs.upload-target }}
        LIGHTHOUSE_PERFORMANCE_MIN_SCORE: ${{ inputs.performance-min-score }}
        LIGHTHOUSE_ACCESSIBILITY_MIN_SCORE: ${{ inputs.accessibility-min-score }}
        LIGHTHOUSE_BEST_PRACTICES_MIN_SCORE: ${{ inputs.best-practices-min-score }}
        LIGHTHOUSE_SEO_MIN_SCORE: ${{ inputs.seo-min-score }}
        LIGHTHOUSE_LCP_MAX_MS: ${{ inputs.lcp-max-ms }}
        LIGHTHOUSE_TBT_MAX_MS: ${{ inputs.tbt-max-ms }}
        LIGHTHOUSE_CLS_MAX: ${{ inputs.cls-max }}
        LIGHTHOUSE_ERRORS_IN_CONSOLE_MIN_SCORE: ${{ inputs.errors-in-console-min-score }}
      run: |
        set -euo pipefail
        npx --yes "@lhci/cli@${{ inputs.lhci-version }}" autorun --config=.lighthouseci/lighthouserc.cjs

    - name: Assert actionable Best Practices
      if: ${{ inputs.enforce-best-practices-allowlist == 'true' && steps.routes.outputs.route-count != '0' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BEST_PRACTICES_ALLOWLIST: ${{ inputs.best-practices-allowlist }}
      run: |
        set -euo pipefail
        node "$GITHUB_ACTION_PATH/bin/lighthouse-governance.mjs" best-practices \
          --report-dir ".lighthouseci" \
          --allowlist "$BEST_PRACTICES_ALLOWLIST"

    - name: Upload LHCI artifacts
      if: ${{ always() && inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-governance-artifacts
        path: ${{ inputs.working-directory }}/.lighthouseci
        include-hidden-files: true
